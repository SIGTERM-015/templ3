name: Deploy CMS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/cms/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'patches/**'
  workflow_dispatch:

# Never cancel a running CMS deploy — migrations must not be interrupted.
concurrency:
  group: deploy-cms
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate & Deploy CMS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --dir apps/cms exec tsc --noEmit

      - name: Run database migrations
        run: pnpm --dir apps/cms run payload migrate
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE: ${{ secrets.DATABASE_URL_PROD }}

      - name: Build
        run: pnpm cf:build:cms
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

      - name: Deploy
        run: pnpm --dir apps/cms exec wrangler deploy
        env:
          NODE_ENV: production
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
